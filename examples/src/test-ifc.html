<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>Test IFC Parser</title>
<style>
  body { background: #1a1a2e; color: #eee; font-family: monospace; padding: 20px; }
  #output { white-space: pre-wrap; background: #16213e; padding: 15px; border-radius: 8px; max-height: 600px; overflow-y: auto; }
  button { padding: 10px 20px; background: #0f3460; color: #fff; border: none; border-radius: 6px; cursor: pointer; margin: 5px; font-size: 14px; }
  button:hover { background: #1a5276; }
  h2 { color: #e94560; }
</style>
</head><body>
<h2>Hekatan Struct — IFC Analytical Parser Test</h2>
<div>
  <button id="btn-load">📂 Cargar IFC</button>
  <button id="btn-test" disabled>🔬 Test vivienda Silvia</button>
  <input type="file" id="file-input" accept=".ifc" style="display:none">
</div>
<div id="output">Esperando archivo IFC...</div>

<script type="module">
  import { parseIfcToAnalytical } from './shared/ifcAnalyticalParser.ts';

  const output = document.getElementById('output');
  const fileInput = document.getElementById('file-input');
  const btnLoad = document.getElementById('btn-load');
  const btnTest = document.getElementById('btn-test');

  function log(msg) { output.textContent += msg + '\n'; }

  btnLoad.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    output.textContent = `Cargando: ${file.name} (${(file.size/1024).toFixed(1)} KB)...\n`;
    try {
      const text = await file.text();
      log(`Archivo leído: ${text.length} caracteres`);
      const t0 = performance.now();
      const result = parseIfcToAnalytical(text);
      const dt = (performance.now() - t0).toFixed(0);
      log(`\n=== Resultado (${dt} ms) ===`);
      log(`Nodos: ${result.nodes.length}`);
      log(`Elementos: ${result.elements.length}`);

      // Count by category
      const cats = {};
      for (const el of result.elements) {
        cats[el.category] = (cats[el.category] || 0) + 1;
      }
      log(`\nPor categoría:`);
      for (const [cat, count] of Object.entries(cats)) {
        log(`  ${cat}: ${count}`);
      }

      // Show first 5 nodes
      log(`\nPrimeros 5 nodos:`);
      for (const n of result.nodes.slice(0, 5)) {
        log(`  Node ${n.id}: (${n.x.toFixed(3)}, ${n.y.toFixed(3)}, ${n.z.toFixed(3)})`);
      }

      // Show first 10 elements
      log(`\nPrimeros 10 elementos:`);
      for (const el of result.elements.slice(0, 10)) {
        log(`  Elem ${el.id}: ${el.type} [${el.category}] nodes=[${el.nodeIds.join(',')}] sec=${el.sectionName} (${el.b}x${el.h})`);
      }

      // Sections summary
      const secs = {};
      for (const el of result.elements) {
        const key = `${el.sectionName} (${el.b}x${el.h})`;
        secs[key] = (secs[key] || 0) + 1;
      }
      log(`\nSecciones:`);
      for (const [sec, count] of Object.entries(secs)) {
        log(`  ${sec}: ${count} elem`);
      }

      log(`\n✅ Parser OK`);
    } catch (err) {
      log(`\n❌ Error: ${err.message}\n${err.stack}`);
    }
  });

  // Auto-test with fetch if available
  btnTest.disabled = false;
  btnTest.addEventListener('click', async () => {
    output.textContent = 'Cargando vivienda Silvia sin escalera.ifc...\n';
    try {
      const resp = await fetch('/ifc/vivienda Silvia sin escalera.ifc');
      if (!resp.ok) throw new Error('File not found: ' + resp.status);
      const text = await resp.text();
      fileInput.dispatchEvent(new Event('change')); // won't work, need manual
      // Parse directly
      const t0 = performance.now();
      const result = parseIfcToAnalytical(text);
      const dt = (performance.now() - t0).toFixed(0);
      log(`Parsed in ${dt}ms: ${result.nodes.length} nodes, ${result.elements.length} elements`);
    } catch(e) {
      log('Cannot auto-fetch: ' + e.message + '\nUse the file button instead.');
    }
  });
</script>
</body></html>
