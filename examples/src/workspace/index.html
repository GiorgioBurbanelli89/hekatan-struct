<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" href="/img/favicon.ico" type="image/x-icon" />
    <title>Hekatan Struct</title>
    <style>
      /* Safe area for mobile browsers with URL bar / notch */
      :root {
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }
      body {
        padding-top: var(--safe-top);
        padding-bottom: var(--safe-bottom);
      }
    </style>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-1X49GCVEK9"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-1X49GCVEK9");
    </script>
    <!-- GoatCounter (privacy-first analytics, sin cookies, muestra países).
         IMPORTANTE: registrate gratis en https://www.goatcounter.com/signup y
         reemplazá "hekatan-struct" por tu subdominio (si elegiste otro nombre).
         El dashboard es público por defecto — útil para mostrar en el TFM las
         estadísticas reales de uso. Dashboard: https://hekatan-struct.goatcounter.com -->
    <script
      data-goatcounter="https://hekatan-struct.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>
    <!-- web-ifc WASM — el archivo vive en `examples/public/` (vite lo copia al
         ROOT del bundle, NO a workspace/). Por eso necesitamos `../`:
           dev:        /workspace/             → ../web-ifc-api-iife.js → /web-ifc-api-iife.js
           gh-pages:   /hekatan-struct/workspace/ → ../web-ifc-api-iife.js → /hekatan-struct/web-ifc-api-iife.js -->
    <script src="../web-ifc-api-iife.js"></script>
  </head>
  <body>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
